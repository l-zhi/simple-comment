services:
  mysql:
    image: mysql:8
    container_name: simple-comment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: simple_comment
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: simple-comment-backend
    restart: on-failure
    environment:
      APP_PORT: 8081
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: simple_comment
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9081:8081"

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    container_name: simple-comment-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:

